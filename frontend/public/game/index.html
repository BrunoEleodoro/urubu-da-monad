<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urubu da Monad | MON/USD Live</title>
<link rel="icon" type="image/png" href="logo-icon.png">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e1a;
    --bg2: #141422;
    --bg-card: #1a1a2e;
    --border: #2a2a40;
    --text: #e8e8f0;
    --text2: #7a7a9a;
    --text3: #3e3e5a;
    --purple: #8b5cf6;
    --purple-dim: rgba(139,92,246,0.15);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.10);
    --orange: #f59e0b;
    --orange-dim: rgba(245,158,11,0.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === TOP NAV === */
  .topnav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .topnav-left { display: flex; align-items: center; gap: 12px; }
  .topnav-logo { height: 36px; border-radius: 6px; }
  .topnav-brand {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: var(--orange); letter-spacing: -0.5px;
  }
  .topnav-right { display: flex; align-items: center; gap: 12px; }
  .wallet-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    min-height: 44px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    color: var(--text);
    cursor: pointer;
    transition: transform .15s ease, border-color .15s ease, background .15s ease;
  }
  .wallet-btn:hover { border-color: #4b4b72; transform: translateY(-1px); }
  .wallet-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
  .wallet-btn.connected { border-color: rgba(34,197,94,0.35); background: rgba(34,197,94,0.09); }
  .wallet-btn.connecting { border-color: rgba(245,158,11,0.35); background: rgba(245,158,11,0.10); }
  .wallet-indicator {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--text3);
    box-shadow: 0 0 0 5px rgba(255,255,255,0.04);
    flex: 0 0 auto;
  }
  .wallet-btn.connected .wallet-indicator { background: var(--green); box-shadow: 0 0 0 5px rgba(34,197,94,0.10); }
  .wallet-btn.connecting .wallet-indicator { background: var(--orange); box-shadow: 0 0 0 5px rgba(245,158,11,0.12); }
  .wallet-copy {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    min-width: 0;
  }
  .wallet-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    line-height: 1.1;
    white-space: nowrap;
  }
  .wallet-sub {
    margin-top: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text2);
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }
  .balance-box {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 600; color: var(--text);
  }
  .balance-box .curr { color: var(--orange); font-size: 11px; }

  /* === LAYOUT === */
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 260px;
    height: calc(100vh - 53px);
  }
  .center {
    display: flex; flex-direction: column;
    background: var(--bg); min-height: 0; overflow: hidden;
  }
  @media(max-width: 768px) {
    .main-layout { grid-template-columns: 1fr; }
    .bet-sidebar { border-left: none; border-top: 1px solid var(--border); }
  }

  /* Chart */
  .chart-area {
    flex: 1; position: relative;
    overflow: hidden; min-height: 250px;
  }
  #priceCanvas { display: block; width: 100%; height: 100%; }


  /* P&L overlay (always visible) */
  .pnl-overlay {
    position: absolute; top: 16px; left: 50%;
    transform: translateX(-50%);
    text-align: center; pointer-events: none; z-index: 10;
    transition: opacity 0.3s;
  }
  .pnl-amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(32px, 7vw, 58px);
    font-weight: 800; line-height: 1; letter-spacing: -1px;
    font-variant-numeric: tabular-nums;
  }
  .pnl-amount.win { color: var(--green); text-shadow: 0 0 30px rgba(34,197,94,0.3); }
  .pnl-amount.lose { color: var(--red); text-shadow: 0 0 30px rgba(239,68,68,0.3); }
  .pnl-amount.idle { color: var(--text3); text-shadow: none; }
  .pnl-detail {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text2); margin-top: 4px;
    letter-spacing: 0.5px;
  }
  .pnl-detail.idle { color: var(--text3); }
  .pnl-timer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: var(--orange); margin-top: 6px;
    letter-spacing: 1px;
  }
  .pnl-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text3);
    margin-top: 4px; letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* Round result toast */
  .round-result {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    text-align: center; pointer-events: none; z-index: 30;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
    opacity: 0;
  }
  .round-result.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
  .round-result-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 800; line-height: 1;
  }
  .round-result-text.win { color: var(--green); text-shadow: 0 0 60px rgba(34,197,94,0.4); }
  .round-result-text.lose { color: var(--red); text-shadow: 0 0 60px rgba(239,68,68,0.4); }
  .round-result-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; margin-top: 8px;
  }


  /* === TRADE PANEL === */
  .bet-sidebar {
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .trade-toggle {
    display: none;
    width: 100%;
    border: none;
    background: transparent;
    color: inherit;
    cursor: pointer;
    padding: 16px 18px;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    text-align: left;
  }
  .trade-toggle-copy {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }
  .trade-toggle-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text);
  }
  .trade-toggle-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .trade-toggle-icon {
    font-size: 16px;
    color: var(--orange);
    transition: transform .28s ease;
  }
  .trade-panel-body {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .bet-card {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .bet-sidebar-hdr {
    padding: 16px 16px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text2);
  }
  .trade-copy-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .trade-copy-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text2);
    line-height: 1.5;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .bp-row { display: flex; align-items: center; gap: 6px; }
  .bp-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text3); min-width: 30px;
  }
  .bp-input-wrap {
    flex: 1; display: flex; align-items: center;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
  }
  .bp-input-wrap input {
    flex: 1; background: transparent; border: none;
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 600;
    padding: 7px 8px; outline: none; width: 50px;
  }
  .bp-input-wrap .bp-adj {
    background: var(--bg-card); border: none;
    color: var(--text2); font-family: 'JetBrains Mono', monospace;
    font-size: 14px; padding: 5px 8px; cursor: pointer;
    border-left: 1px solid var(--border);
  }
  .bp-input-wrap .bp-adj:hover { color: var(--text); background: var(--border); }
  .bp-quick { display: flex; gap: 3px; }
  .bp-quick button {
    flex: 1; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; padding: 4px 2px;
    border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg); color: var(--text2); cursor: pointer;
  }
  .bp-quick button:hover { border-color: var(--text3); color: var(--text); }
  .bp-actions {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }
  .bp-bet-btn {
    width: 100%; padding: 14px 12px; border: none; border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1.5px;
    cursor: pointer; transition: all .15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .bp-bet-btn.btn-up {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #fff; box-shadow: 0 4px 20px rgba(34,197,94,0.3);
  }
  .bp-bet-btn.btn-up:hover {
    background: linear-gradient(135deg, #16a34a, #15803d);
    box-shadow: 0 4px 24px rgba(34,197,94,0.45);
  }
  .bp-bet-btn.btn-down {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: #fff; box-shadow: 0 4px 20px rgba(239,68,68,0.3);
  }
  .bp-bet-btn.btn-down:hover {
    background: linear-gradient(135deg, #dc2626, #b91c1c);
    box-shadow: 0 4px 24px rgba(239,68,68,0.45);
  }
  .bp-bet-btn:active { transform: scale(0.97); }
  .bp-bet-btn:disabled {
    opacity: 0.4; cursor: not-allowed;
    transform: none !important;
  }
  .bp-bet-btn .arrow { font-size: 18px; }

  /* Active bet status in sidebar */
  .bet-active-status {
    display: none;
    padding: 10px 14px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }
  .bet-active-status.show { display: block; }
  .bet-active-status .bas-dir {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .bet-active-status .bas-dir.up { color: var(--green); }
  .bet-active-status .bas-dir.down { color: var(--red); }
  .bet-active-status .bas-amt {
    font-size: 10px; color: var(--text3);
  }

  /* Price table */
  .price-table-wrap {
    background: var(--bg2); border-top: 1px solid var(--border);
    padding: 10px 16px; max-height: 180px; overflow-y: auto;
  }
  .price-table-wrap::-webkit-scrollbar { width: 4px; }
  .price-table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .pt-hdr {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
  }
  .pt-hdr span { color: var(--text2); font-weight: 400; }
  .tbl { width: 100%; border-collapse: collapse; }
  .tbl th {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text3);
    text-align: left; padding: 5px 8px;
    border-bottom: 1px solid var(--border);
  }
  .tbl td {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; padding: 5px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.03); color: var(--text2);
  }
  .tbl .c-idx { color: var(--text3); font-size: 9px; width: 24px; }
  .tbl .c-price { color: var(--text); font-weight: 600; }
  .tbl .c-up { color: var(--green); }
  .tbl .c-dn { color: var(--red); }
  .tbl .c-flat { color: var(--text3); }
  .tbl .c-dim { color: var(--text3); font-size: 10px; }
  .empty {
    text-align: center; padding: 20px; color: var(--text3);
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
  }

  @media(max-width: 640px) {
    .topnav { flex-wrap: wrap; gap: 10px; }
    .topnav-right { width: 100%; justify-content: space-between; }
    .wallet-btn { flex: 1 1 auto; min-width: 0; }
    .balance-box { font-size: 11px; padding: 4px 10px; }
    .wallet-sub { display: none; }
    .wallet-btn { padding: 7px 10px; }
    .wallet-label { font-size: 11px; }
  }

  @media(max-width: 768px) {
    .center { padding-bottom: 86px; }
    .bet-sidebar {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 40;
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      background: rgba(20,20,34,0.96);
      backdrop-filter: blur(16px);
    }
    .trade-toggle {
      display: flex;
    }
    .trade-panel-body {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transform: translateY(22px);
      transition: max-height .32s ease, opacity .2s ease, transform .32s ease;
    }
    .bet-sidebar.open .trade-panel-body {
      max-height: 340px;
      opacity: 1;
      transform: translateY(0);
    }
    .bet-sidebar.open .trade-toggle-icon {
      transform: rotate(180deg);
    }
    .bet-sidebar-hdr {
      padding-top: 6px;
    }
  }
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-left">
    <img src="logo-icon.png" alt="Urubu" class="topnav-logo">
    <span class="topnav-brand">URUBU DA MONAD</span>
  </div>
  <div class="topnav-right">
    <button class="wallet-btn" id="walletBtn" type="button" onclick="toggleWalletConnection()">
      <span class="wallet-indicator"></span>
      <span class="wallet-copy">
        <span class="wallet-label" id="walletLabel">Connect wallet</span>
        <span class="wallet-sub" id="walletSub">Use your Farcaster wallet</span>
      </span>
    </button>
    <div class="balance-box">
      <span class="curr" id="balanceAssetLabel">USDC</span>
      <span id="balanceVal">--</span>
    </div>
  </div>
</nav>

<div class="main-layout">
  <div class="center">
    <div style="display:none">
      <span id="timerDisplay"></span>
      <span id="dot"></span>
      <span id="statusTxt"></span>
      <span id="roundLabel"></span>
      <span id="roundHistory"></span>
    </div>
    <div class="chart-area">
      <canvas id="priceCanvas"></canvas>
      <!-- P&L overlay for active bets -->
      <div class="pnl-overlay" id="pnlOverlay">
        <div class="pnl-amount idle" id="pnlAmount">$0.000000</div>
        <div class="pnl-detail idle" id="pnlDetail">MON/USD</div>
        <div class="pnl-timer" id="pnlTimer"></div>
        <div class="pnl-hint" id="pnlHint">Place a bet to start</div>
      </div>
      <!-- Round result splash -->
      <div class="round-result" id="roundResult">
        <div class="round-result-text" id="roundResultText"></div>
        <div class="round-result-sub" id="roundResultSub"></div>
      </div>
    </div>

    <div class="price-table-wrap">
      <div class="pt-hdr">Pyth Oracle Feed <span id="cacheN">(0/12)</span></div>
      <table class="tbl">
        <thead><tr><th>#</th><th>Price</th><th>&Delta;</th><th>Conf</th><th>EMA</th><th>Time</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="emptyMsg">Connecting to the live MON/USD feed...</div>
    </div>
  </div>

  <!-- BET SIDEBAR -->
  <div class="bet-sidebar" id="betSidebar">
    <button class="trade-toggle" id="tradeToggle" type="button" onclick="toggleTradeDrawer()">
      <span class="trade-toggle-copy">
        <span class="trade-toggle-label">Trade Panel</span>
        <span class="trade-toggle-meta" id="tradeToggleMeta">Tap to open long or short</span>
      </span>
      <span class="trade-toggle-icon">&#9650;</span>
    </button>

    <div class="trade-panel-body" id="tradePanelBody">
      <div class="bet-sidebar-hdr">Open Position</div>
      <div class="bet-card">
        <div class="trade-copy-title">Long or short the next move</div>
        <div class="trade-copy-sub">One stake input, live Pyth data, one position per round.</div>
        <div class="bp-row">
          <span class="bp-label">$</span>
          <div class="bp-input-wrap">
            <input type="number" value="0.50" id="betAmt" step="0.1" min="0.1" max="1" inputmode="decimal">
            <button class="bp-adj" onclick="adjBet(-0.1)">-</button>
            <button class="bp-adj" onclick="adjBet(0.1)">+</button>
          </div>
        </div>
        <div class="bp-quick">
          <button onclick="setBet(0.10)">10c</button>
          <button onclick="setBet(0.25)">25c</button>
          <button onclick="setBet(0.50)">50c</button>
          <button onclick="setBet(1.00)">$1</button>
        </div>
        <div class="bp-actions">
          <button class="bp-bet-btn btn-up" id="betBtnUp" onclick="placeBet('up')">
            <span class="arrow">&#9650;</span> LONG
          </button>
          <button class="bp-bet-btn btn-down" id="betBtnDown" onclick="placeBet('down')">
            <span class="arrow">&#9660;</span> SHORT
          </button>
        </div>
      </div>

      <div class="bet-active-status" id="betActiveStatus">
        <div class="bas-dir" id="basDir"></div>
        <div class="bas-amt" id="basAmt"></div>
      </div>
    </div>
  </div>
</div>

<script>
const PAIR = 'MON/USD';
const CHAIN = 'Monad Mainnet';
const FEED = '0x31491744e2dbf6df7fcf4ac0820d18a609b49076d45066d3568424e62f686cd1';
const LATEST_API = 'https://hermes.pyth.network/v2/updates/price/latest';
const STREAM_API = 'https://hermes.pyth.network/v2/updates/price/stream';
const MAX = 12;
const MAX_CHART_POINTS = 240;
const STREAM_RETRY_MS = 2000;
const ROUND_DURATION_MS = 2 * 60 * 1000; // 2 minutes

let cache = [];
let chartPts = [];
let firstPrice = null;
let startTime = null;
let lastConfirmedPrice = null;
let streamSrc = null;
let reconnectTmr = null;
let fallbackPollTmr = null;
let liveEnabled = false;
let lastEntryKey = null;

// === ROUND SYSTEM ===
let roundNumber = 0;
let roundStartTime = null;  // ms timestamp when round started
let roundStartPrice = null; // price at round start

// === BET SYSTEM ===
// Each active bet: { panel, amt, entryPrice, entryTime, direction: 'up' }
let activeBets = [];       // max 2 (one per panel)
let betMarkers = [];       // { t, price, amt } for chart drawing
let demoBalance = 25000;
let walletState = {
  connected: false,
  connecting: false,
  interactive: false,
  action: 'connect',
  addressLabel: '',
  usdcBalanceLabel: '',
  chainLabel: '',
  status: 'Use your Farcaster wallet',
};

function updateBalanceDisplay() {
  // Demo balance stays local to the round engine and is not shown as wallet funds.
}

function syncTradeUi() {
  const meta = document.getElementById('tradeToggleMeta');
  if (!meta) return;

  if (activeBets.length > 0) {
    const bet = activeBets[0];
    meta.textContent = `${bet.direction === 'up' ? 'LONG' : 'SHORT'} $${bet.amt.toFixed(2)} live`;
    return;
  }

  meta.textContent = roundStartTime
    ? 'Tap to open long or short'
    : 'Waiting for the next round';
}

function setTradeDrawer(open) {
  const sidebar = document.getElementById('betSidebar');
  if (!sidebar) return;
  sidebar.classList.toggle('open', open);
}

function toggleTradeDrawer() {
  const sidebar = document.getElementById('betSidebar');
  if (!sidebar) return;
  sidebar.classList.toggle('open');
}

function applyWalletState(nextState) {
  walletState = { ...walletState, ...nextState };
  const walletBtn = document.getElementById('walletBtn');
  const walletLabel = document.getElementById('walletLabel');
  const walletSub = document.getElementById('walletSub');
  const balanceVal = document.getElementById('balanceVal');
  const balanceAssetLabel = document.getElementById('balanceAssetLabel');

  walletBtn.classList.toggle('connected', Boolean(walletState.connected));
  walletBtn.classList.toggle('connecting', Boolean(walletState.connecting));
  walletBtn.disabled = !walletState.interactive && !walletState.connected;
  balanceAssetLabel.textContent = 'USDC';

  if (walletState.connecting) {
    walletLabel.textContent = 'Connecting...';
    walletSub.textContent = 'Approve in Warpcast';
    balanceVal.textContent = '...';
    return;
  }

  if (walletState.connected) {
    walletLabel.textContent = walletState.addressLabel || 'Wallet connected';
    walletSub.textContent =
      walletState.usdcBalanceLabel || walletState.chainLabel || 'Tap to disconnect';
    balanceVal.textContent =
      walletState.usdcBalanceLabel ||
      (walletState.action === 'switch-chain' ? 'Switch chain' : '0.00 USDC');
    return;
  }

  walletLabel.textContent = walletState.interactive ? 'Connect wallet' : 'Warpcast only';
  walletSub.textContent = walletState.status || 'Use your Farcaster wallet';
  balanceVal.textContent = '--';
}

function requestWalletState() {
  if (window.parent === window) return;
  window.parent.postMessage({ type: 'wallet:request-state' }, window.location.origin);
}

function toggleWalletConnection() {
  if (!walletState.interactive && !walletState.connected) return;

  const type = walletState.action === 'disconnect'
    ? 'wallet:disconnect'
    : walletState.action === 'switch-chain'
      ? 'wallet:switch-chain'
      : 'wallet:connect';
  window.parent.postMessage({ type }, window.location.origin);
}

window.addEventListener('message', (event) => {
  if (event.origin !== window.location.origin) return;
  if (event.data?.type !== 'wallet:update') return;
  applyWalletState(event.data);
});

// Start a new 2-minute round
function startNewRound() {
  roundNumber++;
  roundStartTime = Date.now();
  roundStartPrice = lastConfirmedPrice;
  firstPrice = lastConfirmedPrice; // reset multiplier base
  startTime = roundStartTime;
  chartPts = lastConfirmedPrice ? [{ t: roundStartTime, price: lastConfirmedPrice }] : [];
  document.getElementById('roundLabel').textContent = `ROUND ${roundNumber}`;

  // Enable bet buttons
  document.getElementById('betBtnUp').disabled = false;
  document.getElementById('betBtnDown').disabled = false;
  document.getElementById('betBtnUp').innerHTML = '<span class="arrow">&#9650;</span> LONG';
  document.getElementById('betBtnDown').innerHTML = '<span class="arrow">&#9660;</span> SHORT';
  document.getElementById('betActiveStatus').classList.remove('show');

  // Hide result splash
  document.getElementById('roundResult').classList.remove('show');
  syncTradeUi();
}

// End the current round, settle bets
function endRound() {
  const currentPrice = lastConfirmedPrice;
  let totalPnl = 0;

  for (const bet of activeBets) {
    const priceDiff = currentPrice - bet.entryPrice;
    const pctChange = priceDiff / bet.entryPrice;
    const dirMult = bet.direction === 'down' ? -1 : 1;
    // Leverage: 10x the percentage change applied to bet amount
    const pnl = bet.amt * pctChange * dirMult * 10;
    totalPnl += pnl;
    demoBalance += bet.amt + pnl; // return stake + pnl
  }

  // Show round result if had active bets
  if (activeBets.length > 0) {
    const resultEl = document.getElementById('roundResult');
    const textEl = document.getElementById('roundResultText');
    const subEl = document.getElementById('roundResultSub');
    const won = totalPnl >= 0;
    textEl.className = 'round-result-text ' + (won ? 'win' : 'lose');
    const totalStake = activeBets.reduce((s, b) => s + b.amt, 0);
    const pctResult = totalStake > 0 ? ((totalPnl / totalStake) * 100) : 0;
    textEl.textContent = (pctResult >= 0 ? '+' : '') + pctResult.toFixed(4) + '%';
    const pnlStr = (won ? '+$' : '-$') + Math.abs(totalPnl).toFixed(6);
    subEl.textContent = won ? `\u{1F985} ${pnlStr}` : `\u{1F985} ${pnlStr}`;
    subEl.style.color = won ? 'var(--green)' : 'var(--red)';
    resultEl.classList.add('show');

  }

  activeBets = [];
  updateBalanceDisplay();


  // Disable buttons during cooldown
  document.getElementById('betBtnUp').disabled = true;
  document.getElementById('betBtnDown').disabled = true;
  syncTradeUi();

  // Start next round after 3 second cooldown
  setTimeout(() => startNewRound(), 3000);
}


// Update P&L overlay in real time
function updatePnlOverlay(currentPrice) {
  const amtEl = document.getElementById('pnlAmount');
  const detailEl = document.getElementById('pnlDetail');
  const timerEl = document.getElementById('pnlTimer');
  const hintEl = document.getElementById('pnlHint');

  // Round countdown (always show if round active)
  if (roundStartTime) {
    const remaining = Math.max(0, ROUND_DURATION_MS - (Date.now() - roundStartTime));
    const sec = Math.ceil(remaining / 1000);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    timerEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  } else {
    timerEl.textContent = '';
  }

  if (activeBets.length === 0) {
    // Idle state: show live price, muted
    amtEl.textContent = fmtHi(currentPrice);
    amtEl.className = 'pnl-amount idle';
    detailEl.textContent = `MON/USD · ${fmtHi(currentPrice)}`;
    detailEl.className = 'pnl-detail idle';
    hintEl.textContent = roundStartTime ? 'Place a bet \u25B2 UP or \u25BC DOWN' : 'Next round starting...';
    hintEl.style.display = '';
    return;
  }

  // Active bet state
  hintEl.style.display = 'none';

  let totalPnl = 0;
  let totalStake = 0;
  let avgEntry = 0;
  for (const bet of activeBets) {
    const priceDiff = currentPrice - bet.entryPrice;
    const pctChange = priceDiff / bet.entryPrice;
    const dirMult = bet.direction === 'down' ? -1 : 1;
    totalPnl += bet.amt * pctChange * dirMult * 10;
    totalStake += bet.amt;
    avgEntry += bet.entryPrice;
  }
  avgEntry /= activeBets.length;

  const won = totalPnl >= 0;
  const pctPnl = totalStake > 0 ? ((totalPnl / totalStake) * 100) : 0;
  amtEl.textContent = (pctPnl >= 0 ? '+' : '') + pctPnl.toFixed(4) + '%';
  amtEl.className = 'pnl-amount ' + (won ? 'win' : 'lose');

  const dir = activeBets[0].direction === 'up' ? '\u25B2' : '\u25BC';
  const pnlStr = (won ? '+$' : '-$') + Math.abs(totalPnl).toFixed(6);
  detailEl.textContent =
    `${dir} ${pnlStr} | Entry ${fmtHi(avgEntry)} | Now ${fmtHi(currentPrice)}`;
  detailEl.className = 'pnl-detail';
}

// ============================================================
//  CANVAS
// ============================================================
const cvs = document.getElementById('priceCanvas');
const ctx = cvs.getContext('2d');
let W, H, dpr;

function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  const rect = cvs.parentElement.getBoundingClientRect();
  W = rect.width; H = rect.height;
  cvs.width = W * dpr; cvs.height = H * dpr;
  cvs.style.width = W + 'px'; cvs.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeCanvas);

const PAD = { top: 24, right: 80, bottom: 40, left: 16 };

// ============================================================
//  LERP
// ============================================================
let targetPrice = null;
let lerpFrom = null;
let lerpStartMs = 0;
const LERP_MS = 400;

function currentDisplayPrice(now) {
  if (targetPrice === null) return lastConfirmedPrice;
  if (!lerpFrom) return targetPrice;
  const elapsed = now - lerpStartMs;
  const t = Math.min(elapsed / LERP_MS, 1);
  return lerpFrom.price + (targetPrice - lerpFrom.price) * t;
}

// ============================================================
//  DRAW
// ============================================================
function drawChart(now) {
  ctx.clearRect(0, 0, W, H);
  const cw = W - PAD.left - PAD.right;
  const ch = H - PAD.top - PAD.bottom;

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 6; i++) {
    const y = PAD.top + (ch / 6) * i;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
  }
  for (let i = 0; i <= 8; i++) {
    const x = PAD.left + (cw / 8) * i;
    ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, H - PAD.bottom); ctx.stroke();
  }

  if (chartPts.length === 0) {
    ctx.font = '13px JetBrains Mono, monospace';
    ctx.fillStyle = '#3e3e5a';
    ctx.textAlign = 'center';
    ctx.fillText('Waiting for Pyth oracle data...', W / 2, H / 2);
    return;
  }

  const liveT = Date.now();
  const livePrice = currentDisplayPrice(now);
  const renderPts = chartPts.concat([{ t: liveT, price: livePrice }]);

  updatePnlOverlay(livePrice);

  // Bounds
  const tMin = renderPts[0].t;
  const tMax = renderPts[renderPts.length - 1].t;
  let pMin = Infinity, pMax = -Infinity;
  for (const pt of renderPts) {
    if (pt.price < pMin) pMin = pt.price;
    if (pt.price > pMax) pMax = pt.price;
  }
  for (const bm of betMarkers) {
    if (bm.price < pMin) pMin = bm.price;
    if (bm.price > pMax) pMax = bm.price;
  }
  const pRange = pMax - pMin || 1;
  pMin -= pRange * 0.18;
  pMax += pRange * 0.18;
  const tRange = tMax - tMin || 1;

  const tx = t => PAD.left + ((t - tMin) / tRange) * cw;
  const ty = p => PAD.top + (1 - (p - pMin) / (pMax - pMin)) * ch;

  // Price axis
  ctx.font = '10px JetBrains Mono, monospace';
  ctx.fillStyle = '#3e3e5a';
  for (let i = 0; i <= 5; i++) {
    const p = pMin + (pMax - pMin) * (i / 5);
    ctx.textAlign = 'left';
    ctx.fillText(fmtUsd(p, axisUsdDigits(pMin, pMax)), W - PAD.right + 6, ty(p) + 3);
  }

  // Time axis
  ctx.textAlign = 'center';
  const tStep = Math.max(1, Math.floor(renderPts.length / 5));
  for (let i = 0; i < renderPts.length; i += tStep) {
    const d = new Date(renderPts[i].t);
    ctx.fillText(d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' }), tx(renderPts[i].t), H - 10);
  }

  // Entry price dashed line (for active bets)
  if (activeBets.length > 0) {
    const avgEntry = activeBets.reduce((s, b) => s + b.entryPrice, 0) / activeBets.length;
    ctx.save();
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = 'rgba(245,158,11,0.35)';
    ctx.lineWidth = 1;
    const yE = ty(avgEntry);
    ctx.beginPath(); ctx.moveTo(PAD.left, yE); ctx.lineTo(W - PAD.right, yE); ctx.stroke();
    // Label
    ctx.font = '10px JetBrains Mono, monospace';
    ctx.fillStyle = '#f59e0b';
    ctx.textAlign = 'left';
    ctx.fillText('ENTRY ' + fmtUsd(avgEntry, axisUsdDigits(pMin, pMax)), W - PAD.right + 6, yE - 6);
    ctx.restore();
  } else if (firstPrice !== null) {
    ctx.save();
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = 'rgba(245,158,11,0.2)';
    ctx.lineWidth = 1;
    const yF = ty(firstPrice);
    ctx.beginPath(); ctx.moveTo(PAD.left, yF); ctx.lineTo(W - PAD.right, yF); ctx.stroke();
    ctx.restore();
  }

  // === DYNAMIC COLOR CURVE ===
  // Determine curve color: green if price above entry, red if below, neutral orange if no bet
  const entryPrice = activeBets.length > 0
    ? activeBets.reduce((s, b) => s + b.entryPrice, 0) / activeBets.length
    : null;
  let curveHex, curveRgb;
  if (entryPrice !== null) {
    const above = livePrice >= entryPrice;
    // For DOWN bets, invert the logic (below entry = winning = green)
    const winning = activeBets[0].direction === 'down' ? !above : above;
    curveHex = winning ? '#22c55e' : '#ef4444';
    curveRgb = winning ? '34,197,94' : '239,68,68';
  } else {
    curveHex = '#f59e0b';
    curveRgb = '245,158,11';
  }

  // Draw curve path
  ctx.beginPath();
  ctx.moveTo(tx(renderPts[0].t), ty(renderPts[0].price));
  if (renderPts.length === 2) {
    ctx.lineTo(tx(renderPts[1].t), ty(renderPts[1].price));
  } else {
    for (let i = 0; i < renderPts.length - 1; i++) {
      const x0 = tx(renderPts[i].t), y0 = ty(renderPts[i].price);
      const x1 = tx(renderPts[i + 1].t), y1 = ty(renderPts[i + 1].price);
      const mx = (x0 + x1) / 2, my = (y0 + y1) / 2;
      if (i === 0) ctx.lineTo(mx, my);
      else ctx.quadraticCurveTo(x0, y0, mx, my);
    }
    const last = renderPts[renderPts.length - 1];
    ctx.lineTo(tx(last.t), ty(last.price));
  }
  ctx.strokeStyle = curveHex;
  ctx.lineWidth = 3;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.stroke();

  // Gradient fill
  const last = renderPts[renderPts.length - 1];
  ctx.lineTo(tx(last.t), H - PAD.bottom);
  ctx.lineTo(tx(renderPts[0].t), H - PAD.bottom);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, PAD.top, 0, H - PAD.bottom);
  grad.addColorStop(0, `rgba(${curveRgb}, 0.25)`);
  grad.addColorStop(0.5, `rgba(${curveRgb}, 0.10)`);
  grad.addColorStop(1, `rgba(${curveRgb}, 0.0)`);
  ctx.fillStyle = grad;
  ctx.fill();

  // Line glow
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(tx(renderPts[0].t), ty(renderPts[0].price));
  for (let i = 0; i < renderPts.length - 1; i++) {
    const x0 = tx(renderPts[i].t), y0 = ty(renderPts[i].price);
    const x1 = tx(renderPts[i + 1].t), y1 = ty(renderPts[i + 1].price);
    const mx = (x0 + x1) / 2, my = (y0 + y1) / 2;
    if (i === 0) ctx.lineTo(mx, my);
    else ctx.quadraticCurveTo(x0, y0, mx, my);
  }
  ctx.lineTo(tx(last.t), ty(last.price));
  ctx.strokeStyle = `rgba(${curveRgb}, 0.3)`;
  ctx.lineWidth = 8;
  ctx.lineJoin = 'round';
  ctx.stroke();
  ctx.restore();

  // === BET MARKERS ===
  for (const bm of betMarkers) {
    if (bm.t < tMin || bm.t > tMax) continue;
    const bx = tx(bm.t);
    const by = ty(bm.price);
    const isUp = bm.direction !== 'down';
    const mColor = isUp ? '34,197,94' : '239,68,68';
    const mHex = isUp ? '#22c55e' : '#ef4444';

    // Glow
    ctx.beginPath();
    ctx.arc(bx, by, 18, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${mColor}, 0.12)`;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bx, by, 12, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${mColor}, 0.2)`;
    ctx.fill();

    // Eagle emoji
    ctx.font = '22px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u{1F985}', bx, by);

    // Amount + direction label
    ctx.font = '9px JetBrains Mono, monospace';
    ctx.fillStyle = mHex;
    ctx.textBaseline = 'top';
    ctx.fillText('$' + bm.amt.toFixed(2) + (isUp ? ' \u25B2' : ' \u25BC'), bx, by + 16);
    ctx.textBaseline = 'alphabetic';
  }

  // Leading dot at the end of the line
  const dotX = tx(last.t);
  const dotY = ty(last.price);
  // Outer glow
  ctx.beginPath();
  ctx.arc(dotX, dotY, 12, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(${curveRgb}, 0.15)`;
  ctx.fill();
  // Mid ring
  ctx.beginPath();
  ctx.arc(dotX, dotY, 8, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(${curveRgb}, 0.35)`;
  ctx.lineWidth = 2;
  ctx.stroke();
  // Core dot
  ctx.beginPath();
  ctx.arc(dotX, dotY, 5, 0, Math.PI * 2);
  ctx.fillStyle = curveHex;
  ctx.fill();
}


// ============================================================
//  60 FPS LOOP
// ============================================================
function renderLoop(now) {
  drawChart(now);

  // Round timer
  if (roundStartTime) {
    const elapsed = Date.now() - roundStartTime;
    const remaining = Math.max(0, ROUND_DURATION_MS - elapsed);
    const sec = Math.ceil(remaining / 1000);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    document.getElementById('timerDisplay').textContent =
      `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    // End round when time is up
    if (remaining <= 0 && roundStartTime) {
      const rst = roundStartTime;
      roundStartTime = null; // prevent re-trigger
      endRound();
    }
  }

  requestAnimationFrame(renderLoop);
}
requestAnimationFrame(renderLoop);

// ============================================================
//  FETCH / PARSE
// ============================================================
async function fetchPrice() {
  const r = await fetch(`${LATEST_API}?ids[]=${FEED}`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  if (!d.parsed?.length) throw new Error('No parsed price returned');
  return parseEntry(d.parsed[0]);
}

function parseEntry(node) {
  const p = node.price, e = node.ema_price;
  const expo = Number(p.expo);
  const mul = Math.pow(10, expo);
  return {
    id: node.id,
    price: Number(p.price) * mul,
    conf: Number(p.conf) * mul,
    ema: Number(e.price) * mul,
    time: Number(p.publish_time),
    receivedAt: Date.now(),
  };
}

function usdDigits(value) {
  const abs = Math.abs(value);
  if (!Number.isFinite(abs)) return 4;
  if (abs >= 1000) return 4;
  if (abs >= 100) return 5;
  if (abs >= 1) return 6;
  if (abs >= 0.1) return 7;
  if (abs >= 0.01) return 8;
  return 8;
}

function axisUsdDigits(min, max) {
  const anchor = Math.max(Math.abs(min), Math.abs(max), Math.abs(max - min));
  if (anchor >= 1000) return 3;
  if (anchor >= 100) return 4;
  if (anchor >= 1) return 5;
  if (anchor >= 0.1) return 6;
  return 7;
}

function fmtUsd(value, digits = usdDigits(value)) {
  return '$' + value.toLocaleString('en-US', {
    minimumFractionDigits: digits, maximumFractionDigits: digits,
  });
}

function fmt(p) { return fmtUsd(p); }
function fmtHi(p) { return fmtUsd(p, 6); }
function fmtTime(ts) {
  return new Date(ts * 1000).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function setStatus(txt, type) {
  document.getElementById('dot').className = 'cs-dot' + (type === 'on' ? ' on' : type === 'err' ? ' err' : '');
  document.getElementById('statusTxt').textContent = txt;
}

function trimChartPoints() {
  if (chartPts.length > MAX_CHART_POINTS) chartPts = chartPts.slice(-MAX_CHART_POINTS);
}

function entryKey(entry) {
  return [entry.time, entry.price, entry.conf, entry.ema].join(':');
}

function ingestEntry(entry) {
  const key = entryKey(entry);
  if (key === lastEntryKey) return false;
  lastEntryKey = key;

  const now = entry.receivedAt || Date.now();
  if (firstPrice === null) { firstPrice = entry.price; startTime = now; }

  cache.push(entry);
  if (cache.length > MAX) cache = cache.slice(-MAX);

  if (lastConfirmedPrice !== null) {
    chartPts.push({ t: now, price: currentDisplayPrice(performance.now()) });
  }

  lerpFrom = { price: lastConfirmedPrice ?? entry.price, t: now };
  targetPrice = entry.price;
  lerpStartMs = performance.now();
  lastConfirmedPrice = entry.price;

  if (chartPts.length === 0) {
    chartPts.push({ t: now, price: entry.price });
    lerpFrom = null;
  }

  trimChartPoints();
  renderTable();
  return true;
}

async function fetchOnce(statusLabel = 'Snapshot') {
  setStatus('Fetching...', 'on');
  try {
    const entry = await fetchPrice();
    ingestEntry(entry);
    if (statusLabel) setStatus(`${statusLabel} · ${fmtTime(entry.time)}`, 'on');
  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
  }
}

function renderTable() {
  document.getElementById('cacheN').textContent = `(${cache.length}/${MAX})`;
  if (!cache.length) {
    document.getElementById('tbody').innerHTML = '';
    document.getElementById('emptyMsg').style.display = 'block';
    return;
  }
  document.getElementById('emptyMsg').style.display = 'none';
  const rev = [...cache].reverse();
  document.getElementById('tbody').innerHTML = rev.map((e, i) => {
    const idx = cache.length - i;
    const prev = cache[cache.length - i - 2];
    let chg = '<td class="c-flat">\u2014</td>';
    if (prev) {
      const d = e.price - prev.price;
      const pct = (d / prev.price * 100).toFixed(6);
      const cls = d > 0 ? 'c-up' : d < 0 ? 'c-dn' : 'c-flat';
      chg = `<td class="${cls}">${d > 0 ? '+' : ''}${pct}%</td>`;
    }
    return `<tr><td class="c-idx">${idx}</td><td class="c-price">${fmt(e.price)}</td>${chg}<td class="c-dim">\u00b1${fmt(e.conf)}</td><td>${fmt(e.ema)}</td><td class="c-dim">${fmtTime(e.time)}</td></tr>`;
  }).join('');
}

// ============================================================
//  STREAM
// ============================================================
function stopFeedTransports() {
  if (streamSrc) { streamSrc.close(); streamSrc = null; }
  if (fallbackPollTmr) { clearInterval(fallbackPollTmr); fallbackPollTmr = null; }
  if (reconnectTmr) { clearTimeout(reconnectTmr); reconnectTmr = null; }
}

function scheduleReconnect() {
  if (!liveEnabled || reconnectTmr) return;
  setStatus('Reconnecting...', 'err');
  reconnectTmr = setTimeout(() => {
    reconnectTmr = null;
    connectLiveStream();
  }, STREAM_RETRY_MS);
}

function startFallbackPolling() {
  if (fallbackPollTmr) return;
  setStatus('Polling...', 'err');
  fetchOnce('Poll');
  fallbackPollTmr = setInterval(() => fetchOnce('Poll'), 1000);
}

function connectLiveStream() {
  if (!liveEnabled) return;
  if (!('EventSource' in window)) { startFallbackPolling(); return; }
  if (streamSrc) streamSrc.close();
  setStatus('Connecting...', 'on');
  streamSrc = new EventSource(`${STREAM_API}?ids[]=${FEED}`);
  streamSrc.onopen = () => setStatus('Live · ' + CHAIN, 'on');
  streamSrc.onmessage = (evt) => {
    try {
      const payload = JSON.parse(evt.data);
      if (!payload.parsed?.length) return;
      const entry = parseEntry(payload.parsed[0]);
      ingestEntry(entry);
      setStatus(`Live · ${fmtTime(entry.time)}`, 'on');
    } catch (err) {
      setStatus('Parse error', 'err');
    }
  };
  streamSrc.onerror = () => {
    if (streamSrc) { streamSrc.close(); streamSrc = null; }
    scheduleReconnect();
  };
}

function startLive() {
  if (liveEnabled) return;
  liveEnabled = true;
  connectLiveStream();
}

// ============================================================
//  BET CONTROLS
// ============================================================
const MAX_BET = 1;
function adjBet(delta) {
  const el = document.getElementById('betAmt');
  el.value = Math.min(MAX_BET, Math.max(0.1, parseFloat(el.value) + delta)).toFixed(2);
}
function setBet(val) {
  document.getElementById('betAmt').value = Math.min(MAX_BET, val).toFixed(2);
}

function placeBet(direction) {
  if (!lastConfirmedPrice || !roundStartTime) return;

  // Only one bet per round (any direction)
  if (activeBets.length > 0) return;

  const amt = Math.min(MAX_BET, parseFloat(document.getElementById('betAmt').value) || 0.5);

  if (amt > demoBalance) return;

  const entryPrice = currentDisplayPrice(performance.now());

  demoBalance -= amt;
  updateBalanceDisplay();

  activeBets.push({
    direction, amt, entryPrice, entryTime: Date.now(),
  });

  // Place marker on chart
  betMarkers.push({ t: Date.now(), price: entryPrice, amt, direction });

  // Disable both buttons
  document.getElementById('betBtnUp').disabled = true;
  document.getElementById('betBtnDown').disabled = true;
  const btnId = direction === 'up' ? 'betBtnUp' : 'betBtnDown';
  document.getElementById(btnId).innerHTML = '\u{1F985} PLACED';

  // Show active bet in sidebar
  const statusEl = document.getElementById('betActiveStatus');
  statusEl.classList.add('show');
  const dirEl = document.getElementById('basDir');
  dirEl.textContent = direction === 'up' ? '\u25B2 LONG' : '\u25BC SHORT';
  dirEl.className = 'bas-dir ' + direction;
  document.getElementById('basAmt').textContent = `$${amt.toFixed(2)} @ ${fmtHi(entryPrice)}`;
  syncTradeUi();

  if (window.innerWidth <= 768) {
    setTradeDrawer(false);
  }
}

// ============================================================
//  INIT
// ============================================================
resizeCanvas();
updateBalanceDisplay();
syncTradeUi();
applyWalletState(walletState);
requestWalletState();

// Wait for first price, then start round system
fetchOnce(null).finally(() => {
  startLive();
  // Start first round once we have data
  const waitForData = setInterval(() => {
    if (lastConfirmedPrice !== null) {
      clearInterval(waitForData);
      startNewRound();
    }
  }, 200);
});
</script>
